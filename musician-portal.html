<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RISYNC — Join Session</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: sans-serif;
  background: #080B12;
  color: #8D99C0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
}
.logo { font-size: 1.2rem; font-weight: 800; color: #E2E8F8; letter-spacing: .1em; margin-bottom: 24px; align-self: flex-start; }
.logo span { color: #F0A030; }
.screen { width: 100%; max-width: 420px; display: none; }
.screen.active { display: block; }
.card { background: #0F1220; border: 1px solid #252B42; border-radius: 14px; padding: 24px; }
h2 { color: #E2E8F8; font-size: 1.3rem; margin-bottom: 8px; }
p { font-size: .85rem; line-height: 1.6; margin-bottom: 16px; }
label { display: block; font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: #5A6490; margin-bottom: 6px; margin-top: 12px; }
input, select { width: 100%; background: #171B2A; border: 1px solid #252B42; border-radius: 8px; color: #E2E8F8; font-size: .9rem; padding: 11px 14px; outline: none; }
input:focus, select:focus { border-color: #F0A030; }
.btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: .9rem; font-weight: 700; cursor: pointer; margin-top: 12px; }
.btn-primary { background: #F0A030; color: #080B12; }
.btn-secondary { background: transparent; color: #8D99C0; border: 1px solid #252B42; }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.error { background: rgba(224,72,88,.1); border: 1px solid #E04858; border-radius: 8px; padding: 10px 14px; font-size: .8rem; color: #E04858; margin-bottom: 12px; display: none; }
.error.show { display: block; }
.video-box { position: relative; width: 100%; aspect-ratio: 4/3; border-radius: 12px; background: #171B2A; border: 1px solid #252B42; overflow: hidden; margin-bottom: 12px; }
.video-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
.cam-label { position: absolute; bottom: 8px; left: 10px; background: rgba(8,11,18,.8); color: #E2E8F8; font-size: .65rem; padding: 3px 10px; border-radius: 12px; }
.flip-btn { position: absolute; top: 8px; right: 8px; background: rgba(8,11,18,.75); border: 1px solid #252B42; color: #E2E8F8; border-radius: 8px; padding: 6px 12px; font-size: .8rem; cursor: pointer; }
.meter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.meter-label { font-size: .65rem; color: #5A6490; width: 30px; }
.meter-track { flex: 1; height: 8px; background: #171B2A; border-radius: 4px; overflow: hidden; }
.meter-fill { height: 100%; border-radius: 4px; width: 0%; background: linear-gradient(90deg, #28B8A0 0%, #F0A030 70%, #E04858 92%); transition: width .05s linear; }
.meter-db { font-size: .65rem; color: #5A6490; width: 40px; text-align: right; }
.pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.pill { display: flex; align-items: center; gap: 5px; font-size: .65rem; padding: 4px 10px; border-radius: 20px; background: #171B2A; border: 1px solid #252B42; color: #5A6490; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #363D5C; }
.dot.green { background: #40C878; }
.dot.amber { background: #F0A030; animation: blink 1s infinite; }
.dot.red   { background: #E04858; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.ctrl { padding: 12px; background: #171B2A; border: 1px solid #252B42; border-radius: 8px; color: #8D99C0; font-size: .8rem; font-weight: 700; cursor: pointer; text-align: center; }
.ctrl.muted { border-color: #E04858; color: #E04858; }
.chat-box { background: #0F1220; border: 1px solid #252B42; border-radius: 8px; padding: 10px 12px; font-size: .72rem; line-height: 1.9; max-height: 120px; overflow-y: auto; margin-bottom: 8px; }
.chat-row { display: flex; gap: 8px; }
.chat-row input { flex: 1; padding: 8px 12px; font-size: .8rem; }
.chat-send { padding: 8px 16px; background: #F0A030; color: #080B12; border: none; border-radius: 8px; font-weight: 700; font-size: .8rem; cursor: pointer; }
</style>
</head>
<body>

<div class="logo">RIS<span>Y</span>NC</div>

<!-- JOIN -->
<div class="screen active" id="screen-join">
  <div class="card">
    <h2>Join Session</h2>
    <p>Enter the room code from the studio screen.</p>
    <div class="error" id="error-box"></div>
    <label>Room code</label>
    <input type="text" id="room-code" placeholder="e.g. RS4X7B" maxlength="8"
      style="font-size:1.1rem;letter-spacing:.15em;text-transform:uppercase">
    <label>Your name</label>
    <input type="text" id="join-name" placeholder="e.g. Richard">
    <button class="btn btn-primary" id="join-btn">Join →</button>
  </div>
</div>

<!-- PERMISSIONS -->
<div class="screen" id="screen-perms">
  <div class="card" style="text-align:center">
    <div style="font-size:2.5rem;margin-bottom:14px">📷🎤</div>
    <h2>Allow camera &amp; mic</h2>
    <p>Tap Allow when your browser asks.</p>
    <div id="perm-status" style="font-size:.78rem;color:#5A6490;margin-bottom:16px;min-height:20px"></div>
    <button class="btn btn-primary" id="allow-btn">Allow &amp; continue →</button>
  </div>
</div>

<!-- LIVE -->
<div class="screen" id="screen-live">
  <div class="pills">
    <div class="pill"><div class="dot amber" id="conn-dot"></div><span id="conn-label">Connecting...</span></div>
    <div class="pill"><div class="dot" id="mic-dot"></div><span id="mic-label">Mic</span></div>
    <div class="pill"><div class="dot" id="cam-dot"></div><span id="cam-label">Camera</span></div>
  </div>

  <div class="video-box">
    <video id="live-video" autoplay muted playsinline></video>
    <div class="cam-label" id="cam-name">Camera</div>
    <button class="flip-btn" id="flip-btn">⟳ Flip</button>
  </div>

  <div class="meter-row">
    <div class="meter-label">MIC</div>
    <div class="meter-track"><div class="meter-fill" id="mic-fill"></div></div>
    <div class="meter-db" id="mic-db">—</div>
  </div>

  <div class="controls">
    <button class="ctrl" id="mute-btn">🎤 Mic on</button>
    <button class="ctrl" id="cam-btn">📷 Cam on</button>
  </div>


  <div class="chat-box" id="chat-box"></div>
  <div class="chat-row">
    <input type="text" id="chat-input" placeholder="Message...">
    <button class="chat-send" id="chat-send">Send</button>
  </div>
  <button class="btn btn-secondary" id="leave-btn" style="margin-top:12px">Leave</button>
</div>

<script>
const params  = new URLSearchParams(window.location.search);
const urlRoom = params.get('room') || '';
const WS_URL  = 'wss://risync-backend.onrender.com';
const ICE_CFG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80',  username:'openrelayproject', credential:'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username:'openrelayproject', credential:'openrelayproject' },
  ]
};

let ws = null, peerId = null, roomId = null, myName = '';
let localStream = null, facingMode = 'user';
let micMuted = false, camOff = false;
let peers = new Map();
let audioCtx = null, analyser = null, vuFrame = null;

const $ = id => document.getElementById(id);
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); $(id).classList.add('active'); }
function setErr(msg) { const e = $('error-box'); e.textContent = msg; e.classList.add('show'); }
function log(text, sys) { const b = $('chat-box'); b.innerHTML += `<div style="color:${sys?'#5A6490':'#8D99C0'}">${text}</div>`; b.scrollTop = b.scrollHeight; }

// Auto-fill room code from URL
if (urlRoom) $('room-code').value = urlRoom.toUpperCase();

// JOIN
$('join-btn').addEventListener('click', () => {
  roomId = $('room-code').value.trim().toUpperCase();
  myName = $('join-name').value.trim() || 'Phone';
  if (!roomId) { setErr('Enter a room code'); return; }
  $('error-box').classList.remove('show');
  show('screen-perms');
});

// ALLOW CAMERA + MIC
$('allow-btn').addEventListener('click', async () => {
  const btn = $('allow-btn');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  try {
    $('perm-status').textContent = 'Getting camera...';
    const videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode },
      audio: false
    });

    let audioStream = null;
    try {
      $('perm-status').textContent = 'Getting microphone...';
      audioStream = await navigator.mediaDevices.getUserMedia({
        video: false,
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl:  true,
        }
      });
    } catch(e) {
      $('perm-status').textContent = 'Mic unavailable — video only';
    }

    const tracks = [...videoStream.getTracks()];
    if (audioStream) audioStream.getAudioTracks().forEach(t => tracks.push(t));
    localStream = new MediaStream(tracks);

    const hasAudio = localStream.getAudioTracks().length > 0;
    const hasVideo = localStream.getVideoTracks().length > 0;

    $('live-video').srcObject = localStream;
    $('cam-name').textContent  = '🤳 Front';
    $('cam-dot').className  = 'dot ' + (hasVideo ? 'green' : 'red');
    $('mic-dot').className  = 'dot ' + (hasAudio ? 'green' : 'red');
    $('cam-label').textContent = hasVideo ? 'Cam on' : 'No cam';
    $('mic-label').textContent = hasAudio ? 'Mic on' : 'No mic';

    show('screen-live');
    if (hasAudio) {
      startVU();
      // Note: phone local video stays muted to prevent echo
      // Mic monitoring is via the VU meter only
    }
    connectWS();

  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Allow & continue →';
    $('perm-status').textContent = 'Error: ' + e.message;
  }
});

// VU METER
function startVU() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const track  = localStream.getAudioTracks()[0];
    const stream = new MediaStream([track]);
    const src    = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    function draw() {
      vuFrame = requestAnimationFrame(draw);
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b) => a+b, 0) / data.length;
      const pct = Math.min(100, avg / 128 * 200);
      $('mic-fill').style.width = pct + '%';
      $('mic-db').textContent   = pct > 0 ? Math.round(20*Math.log10(pct/100)) + 'dB' : '—';
    }
    draw();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) { console.warn('VU:', e.message); }
}

// WEBSOCKET
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => { $('conn-dot').className = 'dot amber'; };
  ws.onclose = () => {
    $('conn-dot').className = 'dot red';
    $('conn-label').textContent = 'Reconnecting...';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = e => onMsg(JSON.parse(e.data));
}

function send(msg) { if (ws?.readyState === 1) ws.send(JSON.stringify(msg)); }

async function onMsg(msg) {
  switch(msg.type) {
    case 'connected':
      peerId = msg.peerId;
      send({ type:'join-room', roomId, roomCode:roomId, name:myName, role:'musician' });
      break;
    case 'room-joined':
      $('conn-dot').className = 'dot green';
      $('conn-label').textContent = 'Connected';
      log('Joined session', true);
      break;
    case 'peer-joined':
      log(msg.name + ' joined', true);
      break;
    case 'peer-left':
      log('Participant left', true);
      peers.get(msg.peerId)?.close();
      peers.delete(msg.peerId);
      break;
    case 'offer':
      await handleOffer(msg.fromPeerId, msg.sdp);
      break;
    case 'answer':
      await peers.get(msg.fromPeerId)?.setRemoteDescription({ type:'answer', sdp:msg.sdp });
      break;
    case 'ice-candidate':
      if (msg.candidate) await peers.get(msg.fromPeerId)?.addIceCandidate(msg.candidate);
      break;
    case 'chat':
      log((msg.fromName||'Host') + ': ' + msg.text);
      break;
    case 'error':
      log('Error: ' + msg.message, true);
      break;
  }
}

// WEBRTC
function createPC(remotePeerId) {
  const pc = new RTCPeerConnection(ICE_CFG);
  peers.set(remotePeerId, pc);
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = e => {
    if (e.candidate) send({ type:'ice-candidate', candidate:e.candidate, targetPeerId:remotePeerId });
  };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') {
      log('Streaming to studio', true);
      $('conn-label').textContent = 'Live';
    }
  };
  return pc;
}

async function handleOffer(fromPeerId, sdp) {
  const pc = createPC(fromPeerId);
  await pc.setRemoteDescription({ type:'offer', sdp });
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  send({ type:'answer', sdp:answer.sdp, targetPeerId:fromPeerId });
}

// FLIP
$('flip-btn').addEventListener('click', async () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  localStream.getVideoTracks().forEach(t => t.stop());
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode }, audio: false
    });
    const newTrack = newStream.getVideoTracks()[0];
    const vid = $('live-video');
    vid.srcObject = new MediaStream([newTrack, ...localStream.getAudioTracks()]);
    localStream.getVideoTracks().forEach(t => localStream.removeTrack(t));
    localStream.addTrack(newTrack);
    $('cam-name').textContent = facingMode === 'user' ? '🤳 Front' : '📷 Rear';
    vid.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
  } catch(e) {
    facingMode = facingMode === 'user' ? 'environment' : 'user'; // revert
    log('Flip failed: ' + e.message, true);
  }
});

// MUTE / CAM OFF
$('mute-btn').addEventListener('click', () => {
  micMuted = !micMuted;
  localStream?.getAudioTracks().forEach(t => t.enabled = !micMuted);
  $('mute-btn').textContent = micMuted ? '🔇 Mic off' : '🎤 Mic on';
  $('mute-btn').className   = 'ctrl' + (micMuted ? ' muted' : '');
  $('mic-dot').className    = 'dot ' + (micMuted ? 'red' : 'green');
});

$('cam-btn').addEventListener('click', () => {
  camOff = !camOff;
  localStream?.getVideoTracks().forEach(t => t.enabled = !camOff);
  $('cam-btn').textContent = camOff ? '🚫 Cam off' : '📷 Cam on';
  $('cam-btn').className   = 'ctrl' + (camOff ? ' muted' : '');
});

// CHAT
$('chat-send').addEventListener('click', sendChat);
$('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
function sendChat() {
  const t = $('chat-input').value.trim();
  if (!t) return;
  send({ type:'chat', text:t });
  log('You: ' + t);
  $('chat-input').value = '';
}

// LEAVE
$('leave-btn').addEventListener('click', () => {
  localStream?.getTracks().forEach(t => t.stop());
  ws?.close();
  peers.forEach(pc => pc.close());
  cancelAnimationFrame(vuFrame);
  show('screen-join');
});
</script>
</body>
</html>
